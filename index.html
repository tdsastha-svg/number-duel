<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Duel: Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #6c5ce7; color: white; cursor: pointer; }
        .hidden { display: none; }
        #status { color: #feca57; margin: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Number Duel Online</h2>
    
    <div id="connection-area">
        <p>Your ID: <b id="my-id">...</b></p>
        <input type="text" id="join-id" placeholder="Paste Friend's ID">
        <button onclick="connectToFriend()">Connect to Friend</button>
    </div>

    <div id="status">Waiting for connection...</div>

    <div id="game-area" class="hidden">
        <div id="setup-phase">
            <p>Set your secret number (1-100):</p>
            <input type="password" id="my-secret" placeholder="Secret">
            <button onclick="sendSecret()">Lock Number</button>
        </div>

        <div id="play-phase" class="hidden">
            <p id="turn-indicator">Waiting for opponent...</p>
            <input type="number" id="my-guess" placeholder="Your Guess">
            <button id="guess-btn" onclick="sendGuess()">Guess!</button>
            <div id="hint-msg" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
    let peer = new Peer(); 
    let conn;
    let mySecret = null;
    let opponentSecret = null;
    let myTurn = false;

    // 1. Get your ID
    peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });

    // 2. Wait for Friend to connect to YOU
    peer.on('connection', (connection) => {
        conn = connection;
        setupConnection();
    });

    // 3. YOU connect to Friend
    function connectToFriend() {
        const friendId = document.getElementById('join-id').value;
        conn = peer.connect(friendId);
        setupConnection();
    }

    function setupConnection() {
        document.getElementById('status').innerText = "Connected! Setting up...";
        document.getElementById('connection-area').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');

        conn.on('data', (data) => {
            if (data.type === 'secret_set') {
                opponentSecret = data.value;
                checkStart();
            } else if (data.type === 'guess') {
                handleOpponentGuess(data.value);
            }
        });
    }

    function sendSecret() {
        mySecret = parseInt(document.getElementById('my-secret').value);
        conn.send({ type: 'secret_set', value: mySecret });
        document.getElementById('setup-phase').innerHTML = "<b>Secret Locked!</b>";
        checkStart();
    }

    function checkStart() {
        if (mySecret && opponentSecret) {
            document.getElementById('play-phase').classList.remove('hidden');
            // Host goes first
            myTurn = peer.id < conn.peer; 
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('turn-indicator').innerText = myTurn ? "Your Turn!" : "Friend's Turn...";
        document.getElementById('guess-btn').disabled = !myTurn;
    }

    function sendGuess() {
        const g = parseInt(document.getElementById('my-guess').value);
        if (g === opponentSecret) {
            alert("YOU WIN! 🎉");
            location.reload();
        } else {
            const hint = g < opponentSecret ? "Higher" : "Lower";
            document.getElementById('hint-msg').innerText = hint;
            conn.send({ type: 'guess', value: g });
            myTurn = false;
            updateUI();
        }
    }

    function handleOpponentGuess(val) {
        if (val === mySecret) {
            alert("YOU LOST! 💀");
            location.reload();
        } else {
            myTurn = true;
            updateUI();
        }
    }
</script>
</body>
</html>
