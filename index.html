<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Duel: Unstoppable Edition</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --accent: #fdcb6e; --danger: #ff7675; --bg: #0f0c29; }
        body { background: radial-gradient(circle at center, #24243e, #0f0c29); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .box { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 24px; width: 95%; max-width: 380px; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .page { display: none; } .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        button { padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; margin-top: 10px; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .lives { font-size: 1.5rem; margin-bottom: 10px; }
        #log { font-size: 0.7rem; color: var(--accent); margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="box">
    <div id="lobby" class="page active">
        <h2>Number Duel</h2>
        <input type="text" id="roomIn" placeholder="Room Name (e.g. jeeva123)">
        <button onclick="init()">JOIN GAME</button>
        <p id="log">Ready to Duel</p>
    </div>

    <div id="vault" class="page">
        <h2>Set Your Secret</h2>
        <input type="number" id="secretIn" placeholder="1-100">
        <button id="lockBtn" onclick="lock()">LOCK NUMBER</button>
        <p id="vaultStatus" style="color: var(--secondary); margin-top:10px;"></p>
    </div>

    <div id="battle" class="page">
        <div class="lives" id="lives">❤️❤️❤️❤️❤️❤️❤️</div>
        <h3 id="turnTxt">...</h3>
        <p id="hint" style="color: var(--secondary); font-weight: bold; height: 20px;"></p>
        <input type="number" id="guessIn" placeholder="Your Guess">
        <button id="fireBtn" onclick="fire()">FIRE PROBE</button>
    </div>
</div>

<script>
    let ably, channel, mySecret, oppSecret, myTurn, lives = 7, roomID;
    const myID = "user-" + Math.random().toString(36).substr(2, 5);

    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function init() {
        roomID = document.getElementById('roomIn').value.trim();
        if(!roomID) return alert("Enter Room Name");

        document.getElementById('log').innerText = "Connecting to Ably Cloud...";

        // PUBLIC ABLY TEST KEY (For your public project)
        ably = new Ably.Realtime('8O7Y_w.T5A3vA:N9Xj5K1n8zX-C9L2H8_t-3U5U7E'); 
        channel = ably.channels.get(roomID);

        await channel.subscribe('game-event', (msg) => {
            const data = msg.data;
            if(data.sender === myID) return;

            if(data.type === 'ping' && mySecret) {
                // Someone joined late, resend them my secret
                channel.publish('game-event', { type: 'secret', val: mySecret, sender: myID });
            }
            if(data.type === 'secret') { oppSecret = data.val; checkStart(); }
            if(data.type === 'guess') { myTurn = true; updateUI(); }
            if(data.type === 'win') { alert("DEFEAT!"); location.reload(); }
        });

        // Announce presence
        channel.publish('game-event', { type: 'ping', sender: myID });
        show('vault');
    }

    function lock() {
        mySecret = document.getElementById('secretIn').value;
        if(!mySecret) return;
        channel.publish('game-event', { type: 'secret', val: mySecret, sender: myID });
        document.getElementById('lockBtn').classList.add('hidden');
        document.getElementById('vaultStatus').innerText = "Locked! Waiting for opponent...";
        checkStart();
    }

    function checkStart() {
        if(mySecret && oppSecret) {
            show('battle');
            myTurn = (myID < "user-m"); // Simple turn logic
            updateUI();
        }
    }

    function fire() {
        let g = document.getElementById('guessIn').value;
        if(!g) return;
        if(g == oppSecret) {
            channel.publish('game-event', { type: 'win', sender: myID });
            alert("VICTORY!");
            location.reload();
        } else {
            lives--;
            document.getElementById('hint').innerText = g < oppSecret ? "HIGHER ↑" : "LOWER ↓";
            channel.publish('game-event', { type: 'guess', val: g, sender: myID });
            myTurn = false;
            updateUI();
        }
        document.getElementById('guessIn').value = "";
    }

    function updateUI() {
        document.getElementById('lives').innerText = "❤️".repeat(lives) + "🖤".repeat(7 - lives);
        document.getElementById('turnTxt').innerText = myTurn ? "YOUR TURN" : "FRIEND'S TURN";
        document.getElementById('fireBtn').disabled = !myTurn;
    }
</script>
</body>
</html>
